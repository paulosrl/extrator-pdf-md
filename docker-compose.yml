services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pdfcleaner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: ./backend
    env_file: .env
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pdf_data:/data
      - ./backend:/app_src
    working_dir: /app_src

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - pdf_data:/data
      - ./backend:/app_src
      - ./frontend:/frontend
    working_dir: /app_src

  worker:
    build:
      context: ./backend
    env_file: .env
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - pdf_data:/data
      - ./backend:/app_src
    working_dir: /app_src

volumes:
  pgdata:
  pdf_data:
